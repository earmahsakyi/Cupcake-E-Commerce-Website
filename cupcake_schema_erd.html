
<style>
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  products ||--o{ product_images : has
  products ||--o{ product_flavors : has
  products ||--o{ cupcake_variants : has
  products ||--o{ box_configs : has
  products {
    int id PK
    string name
    string slug
    string short_desc
    string product_type
    boolean is_active
  }
  cupcake_variants {
    int id PK
    int product_id FK
    string size
    int price_pesewas
  }
  product_flavors {
    int id PK
    int product_id FK
    string flavor_name
  }
  product_images {
    int id PK
    int product_id FK
    string url
    int sort_order
  }
  box_configs {
    int id PK
    int product_id FK
    int slot_count
    int price_pesewas
  }
  orders ||--o{ order_items : contains
  orders ||--o| payments : has
  orders {
    int id PK
    string reference
    string customer_name
    string customer_phone
    string delivery_address
    int total_pesewas
    string status
    datetime created_at
  }
  order_items ||--o{ box_slot_flavors : has
  order_items ||--o| custom_cake_requests : has
  order_items {
    int id PK
    int order_id FK
    int product_id FK
    int quantity
    int unit_price_pesewas
    string size
    string flavor_note
    json selected_flavors
  }
  box_slot_flavors {
    int id PK
    int order_item_id FK
    int slot_number
    string flavor
  }
  custom_cake_requests {
    int id PK
    int order_item_id FK
    string description
    int budget_pesewas
    string status
    int quoted_price_pesewas
  }
  payments {
    int id PK
    int order_id FK
    string paystack_reference
    int amount_pesewas
    string momo_network
    string phone
    string status
    datetime paid_at
  }
  transactions {
    int id PK
    string type
    int amount_pesewas
    string description
    string source
    int order_id FK
    datetime recorded_at
  }
  orders ||--o{ transactions : generates
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
